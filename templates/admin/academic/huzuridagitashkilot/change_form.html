{% extends "admin/change_form.html" %}

{% block after_field_sets %}
{{ block.super }}
<style>
  .translate-btn {
    margin: 6px 0 14px;
    padding: 6px 14px;
    background: #417690;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  .translate-btn:hover    { background: #2b5372; }
  .translate-btn:disabled { background: #888; cursor: not-allowed; }
  .inline-translate-btn {
    margin: 2px 0 4px;
    padding: 3px 10px;
    background: #417690;
    color: #fff;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    display: block;
  }
  .inline-translate-btn:hover    { background: #2b5372; }
  .inline-translate-btn:disabled { background: #888; cursor: not-allowed; }
</style>

<script>
(function () {
  'use strict';

  const translateUrl = '{% url "admin:huzuridagitashkilot_translate" %}';

  function getCsrf() {
    const inp = document.querySelector('[name=csrfmiddlewaretoken]');
    return inp ? inp.value : '';
  }

  function readField(id) {
    const el = document.getElementById(id);
    return el ? el.value || '' : '';
  }

  function writeField(id, text) {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = text;
    if (typeof $ !== 'undefined') {
      try { $(el).summernote('code', text); } catch (e) {}
    }
  }

  function doTranslate(btn, labelText, getUzText, setRu, setEn) {
    const text = getUzText().trim();
    if (!text) { alert("Avval UZ maydoni to'ldirilsin!"); return; }

    btn.disabled = true;
    btn.textContent = 'Tarjima qilinmoqda...';

    fetch(translateUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCsrf(),
        'X-Requested-With': 'XMLHttpRequest',
      },
      body: JSON.stringify({ text: text }),
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) { alert('Xato: ' + data.error); return; }
        if (data.ru) setRu(data.ru);
        if (data.en) setEn(data.en);
      })
      .catch(function (err) { alert('Tarjima amalga oshmadi: ' + err); })
      .finally(function () {
        btn.disabled = false;
        btn.textContent = 'Translate ' + labelText + ' - UZ -> RU, EN';
      });
  }

  function addBtn(labelText, uzId, ruId, enId) {
    const uzField = document.getElementById(uzId);
    if (!uzField) return;

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'translate-btn';
    btn.textContent = 'Translate ' + labelText + ' - UZ -> RU, EN';
    uzField.parentNode.insertBefore(btn, uzField.nextSibling);

    btn.addEventListener('click', function () {
      doTranslate(
        btn, labelText,
        function () { return readField(uzId); },
        function (ru) { writeField(ruId, ru); },
        function (en) { writeField(enId, en); }
      );
    });
  }

  function addCaptionButtons() {
    document.querySelectorAll('input[id^="id_rasmlar-"][id$="-caption_uz"]').forEach(function (uzField) {
      if (uzField.dataset.translateAdded) return;
      uzField.dataset.translateAdded = '1';

      const match = uzField.id.match(/id_rasmlar-(\d+)-caption_uz/);
      if (!match) return;
      const idx = match[1];
      const ruId = 'id_rasmlar-' + idx + '-caption_ru';
      const enId = 'id_rasmlar-' + idx + '-caption_en';
      const label = 'Izoh-' + (parseInt(idx) + 1);

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'inline-translate-btn';
      btn.textContent = 'Translate ' + label + ' - UZ -> RU, EN';
      uzField.parentNode.insertBefore(btn, uzField.nextSibling);

      btn.addEventListener('click', function () {
        doTranslate(
          btn, label,
          function () { return uzField.value; },
          function (ru) {
            const el = document.getElementById(ruId);
            if (el) el.value = ru;
          },
          function (en) {
            const el = document.getElementById(enId);
            if (el) el.value = en;
          }
        );
      });
    });
  }

  function observeInlines() {
    const group = document.getElementById('rasmlar-group');
    if (!group) return;
    const observer = new MutationObserver(function () { addCaptionButtons(); });
    observer.observe(group, { childList: true, subtree: true });
  }

  addBtn('Nomi', 'id_name_uz', 'id_name_ru', 'id_name_en');
  addBtn('Tavsif', 'id_description_uz', 'id_description_ru', 'id_description_en');
  addCaptionButtons();
  observeInlines();
})();
</script>
{% endblock %}
